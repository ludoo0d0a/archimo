# Build, test, generate architecture report, and deploy the report to GitHub Pages.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions". See docs/GITHUB_PAGES_SETUP.md
name: Build and report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build, test and generate report
        run: mvn -B --no-transfer-progress package -Darchimo.generateReport=true

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: archimo-jar
          path: archimo/target/archimo-*-all.jar

      - name: Upload architecture report
        uses: actions/upload-artifact@v4
        with:
          name: archimo-docs
          path: archimo/target/archimo-docs/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: archimo/target/archimo-docs/site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: github_pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
