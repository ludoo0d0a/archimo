name: Release build (tag-driven version)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to build (e.g. v1.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set Maven project version from tag
        run: |
          echo "Selected tag: ${TAG_NAME}"        # e.g. v1.2.0
          VERSION="${TAG_NAME#v}"                 # -> 1.2.0
          echo "Using version: $VERSION"
          mvn -B versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Build, test and generate report for release
        run: mvn -B --no-transfer-progress package -Darchimo.generateReport=true

      - name: Prepare release assets
        run: |
          JAR=$(ls archimo/target/archimo-*-all.jar)
          cp "$JAR" archimo/target/archimo-release.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          generate_release_notes: true
          files: archimo/target/archimo-release.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


