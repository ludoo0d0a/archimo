apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-front
  namespace: ecommerce-sample
  labels:
    app: nginx-front
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      location / {
        try_files $uri $uri/ /index.html;
      }
      location /api/ {
        proxy_pass http://api-gateway:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Archimo sample — storefront</title>
    </head>
    <body>
      <h1>Sample e-commerce front</h1>
      <p>Static assets are served by <strong>NGINX</strong>. REST calls use <code>/api/…</code>
      (proxied to <strong>Spring Cloud Gateway</strong> → Spring Boot app).</p>
    </body>
    </html>
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-front
  namespace: ecommerce-sample
  labels:
    app: nginx-front
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: nginx-front
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-front
  namespace: ecommerce-sample
  labels:
    app: nginx-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-front
  template:
    metadata:
      labels:
        app: nginx-front
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: cfg
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: cfg
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: cfg
          configMap:
            name: nginx-front
