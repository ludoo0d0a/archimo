<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Modulith Architecture Explorer</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/plantuml-encoder@1.4.0/dist/plantuml-encoder.min.js"></script>
</head>
<body>
  <header>
    <h1>Modulith Architecture Explorer</h1>
    <div class="search-bar">
      <input id="searchInput" type="search" placeholder="Search modules, classes, events…" />
    </div>
  </header>

  <main>
    <section class="sidebar">
      <h2>Diagrams</h2>
      <div id="diagramFilters" class="chip-row">
        <button data-level="all" class="chip chip-active">All</button>
        <button data-level="system" class="chip">System (C4)</button>
        <button data-level="component" class="chip">Component (C4)</button>
        <button data-level="mermaid" class="chip">Mermaid</button>
      </div>
      <ul id="diagramList" class="diagram-list"></ul>
    </section>

    <section class="content">
      <div id="diagramViewerSection" class="diagram-viewer-section hidden">
        <h2 id="diagramViewerTitle" class="diagram-viewer-title"></h2>
        <div id="diagramViewer" class="diagram-viewer"></div>
        <p class="diagram-viewer-raw-link">
          <a id="diagramRawLink" href="#" target="_blank" rel="noopener">Open raw source</a>
        </p>
      </div>
      <h2>Search results</h2>
      <div id="resultsSummary" class="results-summary"></div>

      <div class="results-columns">
        <div>
          <h3>Modules</h3>
          <ul id="modulesResults"></ul>
        </div>
        <div>
          <h3>Classes / Components</h3>
          <ul id="classesResults"></ul>
        </div>
        <div>
          <h3>Events</h3>
          <ul id="eventsResults"></ul>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <span>Generated by Modulith Extractor</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
