# Create a GitHub Release when code is merged (pushed) to the release branch.
# Builds the project, creates a tag and release, and attaches the JAR.
name: Release

on:
  push:
    branches: [ release ]

permissions:
  contents: write  # required to create tags and releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Get version and tag
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          # Use as-is for release (e.g. 1.0.0) or strip -SNAPSHOT
          TAG_VERSION="${VERSION%-SNAPSHOT}"
          echo "tag_name=v${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        run: mvn -B --no-transfer-progress package -Darchimo.generateReport=false

      - name: Prepare release assets
        run: |
          JAR=$(ls archimo/target/archimo-*-all.jar)
          cp "$JAR" archimo/target/archimo-release.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Release ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          files: archimo/target/archimo-release.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
