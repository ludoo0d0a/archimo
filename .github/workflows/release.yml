name: Release build (tag-driven version)

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set Maven project version from tag
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"          # e.g. v1.2.0
          VERSION="${TAG_NAME#v}"                # -> 1.2.0
          echo "Using version: $VERSION"
          mvn -B versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Build, test and generate report for release
        run: mvn -B --no-transfer-progress package -Darchimo.generateReport=true

