apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-front
  namespace: ecommerce-sample
  labels:
    app: nginx-front
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      location / {
        try_files $uri $uri/ /index.html;
      }
      location /api/ {
        proxy_pass http://api-gateway:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-front
  namespace: ecommerce-sample
  labels:
    app: nginx-front
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: nginx-front
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-front
  namespace: ecommerce-sample
  labels:
    app: nginx-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-front
  template:
    metadata:
      labels:
        app: nginx-front
    spec:
      containers:
        - name: nginx
          image: archimo-sample-ecommerce-nginx:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: cfg
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: cfg
          configMap:
            name: nginx-front
